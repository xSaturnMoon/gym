name: Build iOS IPA

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -project Gym.xcodeproj \
            -scheme Gym \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Gym.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET=26.0

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/Gym.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found in archive"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r Gym-unsigned.ipa Payload
          ls -la Gym-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gym-unsigned-ipa
          path: ${{ runner.temp }}/Gym-unsigned.ipa
          retention-days: 30

      - name: Upload archive (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/Gym.xcarchive
          retention-days: 7
